site_name: MetaModule Manual
nav:
  - Getting Started: getting_started.md
  - Using the MetaModule: using_metamodule.md
  - Using the MetaModule with VCV Rack: using_rack.md
  - Using Plugins: plugins.md
site_description: >-
  MetaModule documentation

not_in_nav: |
  index.md

validation:
  nav:
    not_found: info

theme:
  name: material
  logo: img/black.png
  features:
    - navigation.instant
    - navigation.prune
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - toc.follow
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
      primary: black

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
      primary: black

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to system preference
      primary: white

site_url: https://metamodule.4ms.info/docs
site_dir: ../metamodule-docs/docs

plugins:
  - search
  - offline

extra_css: 
  - styles.css
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - toc:
      permalink: []

copyright: >
  Copyright &copy; 2024 4ms Company–
  <a href="#__consent">Change cookie settings</a>

extra:
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject

  homepage: https://metamodule.4ms.info

  social:
    - icon: fontawesome/brands/github 
      link: https://github.com/4ms
      name: 4ms Github
  generator: false


